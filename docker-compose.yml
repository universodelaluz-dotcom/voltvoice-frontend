version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: voltvoice-db
    environment:
      POSTGRES_DB: voltvoice
      POSTGRES_USER: voltvoice
      POSTGRES_PASSWORD: voltvoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voltvoice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voltvoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
