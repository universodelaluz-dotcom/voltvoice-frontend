<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltVoice - Chat Reader TikTok/YouTube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 800px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      font-size: 1em;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.3em;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
    }

    .stream-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 600;
    }

    .status.active {
      background: #d4edda;
      color: #155724;
    }

    .status.inactive {
      background: #f8d7da;
      color: #721c24;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 0.95em;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
    }

    @media (max-width: 600px) {
      .container {
        border-radius: 0;
      }

      .header h1 {
        font-size: 2em;
      }

      .content {
        padding: 20px;
      }

      .tabs {
        flex-direction: column;
      }

      .button-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔊 VoltVoice</h1>
      <p>Lee chats en vivo de TikTok y YouTube</p>
    </div>

    <div class="content">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
        <button class="tab-btn" onclick="switchTab('settings')">⚙️ Configuración</button>
        <button class="tab-btn" onclick="switchTab('account')">👤 Cuenta</button>
      </div>

      <!-- DASHBOARD TAB -->
      <div id="dashboard" class="tab-content active">
        <div id="messages"></div>

        <div class="section">
          <div class="section-title">Mis Streams</div>
          <div id="streams-list">
            <p style="color: #999;">Cargando streams...</p>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Crear nuevo Stream</div>
          <div class="form-group">
            <label>Plataforma</label>
            <select id="platform">
              <option value="">Selecciona plataforma</option>
              <option value="tiktok">TikTok</option>
              <option value="youtube">YouTube</option>
            </select>
          </div>

          <div class="form-group">
            <label>Usuario/Canal</label>
            <input type="text" id="channel" placeholder="@username o ID del canal">
          </div>

          <button class="btn-primary" onclick="createStream()">+ Crear Stream</button>
        </div>
      </div>

      <!-- SETTINGS TAB -->
      <div id="settings" class="tab-content">
        <div class="section">
          <div class="section-title">Configuración de Voz</div>

          <div class="form-group">
            <label>Velocidad de lectura (WPM)</label>
            <input type="number" id="speed" value="150" min="50" max="350">
          </div>

          <div class="form-group">
            <label>Idioma</label>
            <select>
              <option value="es-MX">Español (México)</option>
              <option value="es-ES">Español (España)</option>
              <option value="en-US">English (US)</option>
            </select>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" checked> Censurar contenido ofensivo
            </label>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" checked> Leer nombres de usuario
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Prueba de Voz</div>
          <div class="form-group">
            <input type="text" id="preview-text" placeholder="Escribe algo para escuchar la voz">
          </div>
          <button class="btn-primary" onclick="previewVoice()">🎧 Escuchar</button>
        </div>

        <button class="btn-primary" onclick="saveSettings()" style="width: 100%; margin-top: 20px;">Guardar Configuración</button>
      </div>

      <!-- ACCOUNT TAB -->
      <div id="account" class="tab-content">
        <div class="section">
          <div class="section-title">Información de Cuenta</div>
          <div id="user-info">
            <p style="color: #999;">Cargando datos...</p>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Plan de Suscripción</div>
          <div id="plan-info">
            <p style="color: #999;">Cargando plan...</p>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Acciones</div>
          <button class="btn-secondary" onclick="logout()" style="width: 100%; margin-top: 10px;">Cerrar Sesión</button>
        </div>
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    const API_URL = 'http://localhost:5000/api';
    let token = localStorage.getItem('token');

    // ==== TAB SWITCHING ====
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // ==== API CALLS ====
    async function apiCall(endpoint, method = 'GET', data = null) {
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
        }
      };

      if (token) {
        options.headers['Authorization'] = `Bearer ${token}`;
      }

      if (data) {
        options.body = JSON.stringify(data);
      }

      const res = await fetch(`${API_URL}${endpoint}`, options);
      return res.json();
    }

    // ==== STREAMS ====
    async function loadStreams() {
      try {
        const result = await apiCall('/streams');
        const list = document.getElementById('streams-list');

        if (result.streams && result.streams.length > 0) {
          list.innerHTML = result.streams.map(s => `
            <div class="stream-item">
              <div>
                <strong>${s.platform.toUpperCase()}</strong> - ${s.channel}
                <br>
                <small style="color: #999;">ID: ${s.id}</small>
              </div>
              <span class="status ${s.status === 'active' ? 'active' : 'inactive'}">
                ${s.status.toUpperCase()}
              </span>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<p style="color: #999;">No hay streams aún. Crea uno arriba.</p>';
        }
      } catch (err) {
        console.error('Error loading streams:', err);
      }
    }

    async function createStream() {
      const platform = document.getElementById('platform').value;
      const channel = document.getElementById('channel').value;

      if (!platform || !channel) {
        showMessage('Por favor completa los campos', 'error');
        return;
      }

      try {
        const result = await apiCall('/streams', 'POST', { platform, channel });
        if (result.success) {
          showMessage(`Stream "${channel}" creado exitosamente`, 'success');
          document.getElementById('platform').value = '';
          document.getElementById('channel').value = '';
          loadStreams();
        } else {
          showMessage(result.error || 'Error al crear stream', 'error');
        }
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    // ==== VOICE PREVIEW ====
    async function previewVoice() {
      const text = document.getElementById('preview-text').value;
      if (!text) {
        showMessage('Escribe algo primero', 'error');
        return;
      }

      try {
        const result = await apiCall('/tts/synthesize', 'POST', { text });
        if (result.audioUrl) {
          const audio = new Audio(result.audioUrl);
          audio.play();
          showMessage('Reproduciendoing...', 'info');
        }
      } catch (err) {
        showMessage('Error al sintetizar voz', 'error');
      }
    }

    // ==== SETTINGS ====
    function saveSettings() {
      showMessage('Configuración guardada', 'success');
    }

    // ==== AUTH ====
    function logout() {
      localStorage.removeItem('token');
      showMessage('Sesión cerrada', 'info');
      setTimeout(() => {
        // Aquí redireccionarías a login
        location.reload();
      }, 1000);
    }

    // ==== UI HELPERS ====
    function showMessage(text, type = 'info') {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      document.getElementById('messages').prepend(msg);
      setTimeout(() => msg.remove(), 4000);
    }

    // ==== INIT ====
    document.addEventListener('DOMContentLoaded', async () => {
      if (!token) {
        showMessage('Por favor inicia sesión primero', 'error');
        // Aquí redireccionarías a login
        return;
      }

      loadStreams();
    });
  </script>
</body>
</html>
